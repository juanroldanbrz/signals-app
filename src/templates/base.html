<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Signals{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'neon-green': '#00ff88',
            'neon-blue': '#00cfff',
            'neon-purple': '#a855f7',
            'dark-bg': '#0a0a0f',
            'dark-card': '#12121a',
            'dark-border': '#1e1e2e',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'JetBrains Mono', monospace; }
    .glow-green { box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }
    .glow-blue  { box-shadow: 0 0 20px rgba(0, 207, 255, 0.15); }
    .glow-red   { box-shadow: 0 0 20px rgba(255, 50, 50, 0.2); }
    .border-glow-green { border-color: #00ff88; box-shadow: 0 0 8px rgba(0,255,136,0.3); }
    .border-glow-red   { border-color: #ff4444; box-shadow: 0 0 8px rgba(255,68,68,0.3); }
    .pulse-dot::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
      margin-right: 6px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .scanline {
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
    }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-dark-bg text-gray-200 min-h-screen">

  <!-- Nav -->
  <nav class="border-b border-dark-border bg-dark-card/80 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-neon-green font-bold text-lg tracking-wider">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        SIGNALS
      </a>
      <div class="flex items-center gap-4">
        <a href="/app" class="text-sm text-gray-400 hover:text-neon-green transition-colors">Dashboard</a>
        <span class="text-dark-border">|</span>
        <a href="/app/alerts" class="text-sm text-gray-400 hover:text-neon-green transition-colors">Alerts</a>
        <span class="text-dark-border">|</span>
        <a href="/app/config" class="text-sm text-gray-400 hover:text-neon-green transition-colors">Config</a>
        <span class="text-dark-border">|</span>
        {% if user %}
        <span class="text-xs text-gray-500">{{ user.email }}</span>
        <span class="text-dark-border">|</span>
        <a href="/auth/logout" class="text-xs text-gray-400 hover:text-red-400 transition-colors">Logout</a>
        {% else %}
        <span class="text-xs text-gray-600">v1.0</span>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
