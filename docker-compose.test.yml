services:
  mongo-test:
    image: mongo:7
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data/db   # in-memory for speed; data is discarded after the container stops
